name: Build executables

# Builds both binaries without needing a Linux machine of your own: GitHub
# runs the Linux job on Ubuntu and the Windows job on Windows, then attaches
# both artifacts to the run.
#
# Trigger manually from the Actions tab, or push a v* tag to also create a
# release with both binaries attached.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # 22.04 rather than latest: glibc is not backward-compatible, so
          # building on an older release widens the range of distros the
          # binary will start on.
          - os: ubuntu-22.04
            artifact: openarmx-robstride-linux
            binary: dist/openarmx-robstride
          - os: windows-latest
            artifact: openarmx-robstride-windows
            binary: dist/OpenArmX-RobStride.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Qt runtime libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon-x11-0 libxcb-cursor0 \
            libxcb-icccm4 libxcb-keysyms1 libxcb-shape0 libxcb-randr0 \
            libxcb-render-util0 libxcb-xinerama0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Run tests
        run: python -m pytest tests -q

      - name: Build
        run: python -m PyInstaller openarmx.spec --noconfirm --clean

      - name: Verify the build
        env:
          QT_QPA_PLATFORM: offscreen
        run: ${{ matrix.binary }} --selftest

      - name: Show self-test report
        if: always()
        shell: bash
        run: cat dist/selftest-report.txt || true

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
